<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse</title>
    <link href="styles.css" rel="stylesheet">
    <script src="jszip.js"></script>

    <meta property="og:title" content="Pulse">
    <meta property="og:site_name" content="Pulse">
    <meta property="og:url" content="https://tranquanto.github.io/typical-4k-rhythm-game/">
    <meta property="og:description" content="A simple vertical-scrolling 4-key rhythm game designed for the web, inspired by games like osu!mania and Quaver. It supports .osz file imports (only, currently). This was initially made solely for a simple star rating and performance calculator.">
</head>
<body>
    <div id="background-pulse" style="opacity: 0;"></div>
    <label for="file-drop" id="file-drop-label" class="inactive">
        <span>Drop .osz file here</span>
        <input type="file" id="file-drop" accept=".osz" multiple>
    </label>
    <div id="main-menu">
        <span id="title">Pulse</span><br>
        <button id="play-btn">Play</button>
    </div>
    <div id="map-list" style="display: none;">
        <div id="mods">
            <button id="import-btn"><label for="file-drop" style="cursor: pointer;">Import .osz file(s)</label></button>
            <div id="volume" class="mod">
                <label for="mod-volume-input">Volume</label>
                <input type="range" id="mod-volume-input" min="0" max="1" value="1" step="0.01">
                <span id="mod-volume-value">100%</span>
            </div>
            <div id="mod-speed" class="mod">
                <label for="mod-speed-input">Speed</label>
                <input type="range" id="mod-speed-input" min="0.5" max="2" value="1" step="0.05">
                <span id="mod-speed-value">1.00x</span>
            </div>
            <div id="mod-keys" class="mod">
                <label for="mod-keys-input">Keys</label>
                <input type="range" id="mod-keys-input" min="1" max="9" value="4" step="1">
                <span id="mod-keys-value">4K</span>
            </div>
            <div id="mod-no-holds" class="mod">
                <label for="mod-no-holds-input">No Holds</label>
                <input type="checkbox" id="mod-no-holds-input">
            </div>
        </div>
    </div>
    <div id="game" style="display: none;">
        <span id="score" data-value="0">0</span>
        <div id="stats">
            <span id="combo">Combo: 0</span><br>
            <span id="accuracy">Accuracy: 100.00%</span><br>
            <div id="top-middle">
                <span id="current-stars">0.00*</span> |
                <span id="cumulative-stars">0.00*</span><br>
                <span id="performance">0.0 pp</span><br><br>
                <span id="judgment"></span><br>
                <span id="offset"></span>
            </div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="pause-overlay" style="display: none;">
            <span>Paused</span>
            <button id="pause-resume-btn">Resume</button>
            <button id="pause-retry-btn">Retry</button>
            <button id="pause-menu-btn">Return to Menu</button>
        </div>
    </div>
    <div id="results" style="display: none;">
        <span id="results-title">Map Name</span>
        <span id="results-difficulty">9.01*</span>
        <span id="results-rank">S</span>
        <span id="results-score">987,654</span>
        <span id="results-max-combo">1,234x</span>
        <span id="results-accuracy">98.76%</span>
        <span id="results-performance">45.67 pp</span>
        <span id="results-mods">1.00x</span>
        <button id="retry-btn">Retry</button>
        <button id="results-back-btn">Return to Menu</button>
    </div>
    <script src="mods.js" type="module"></script>
    <script src="menus.js"></script>
</body>
</html>
